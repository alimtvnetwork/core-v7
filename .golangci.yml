run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    # Naming & style
    - revive
    - stylecheck
    - predeclared
    - unconvert
    - wastedassign
    - misspell

    # Bug detection
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - typecheck
    - gosimple
    - nilerr
    - durationcheck

    # Security
    - gosec

    # Performance
    - prealloc
    - gocritic

    # Code hygiene
    - bodyclose
    - copyloopvar
    - usestdlibvars
    - reassign
    - makezero
    - nilnil
    - unparam
    - unused
    - whitespace
    - gofmt

linters-settings:
  revive:
    severity: warning
    confidence: 0.8
    rules:
      # Reject numbered variable names: err1, val2, v3, etc.
      - name: var-naming
        severity: warning
        disabled: false
        arguments:
          - [] # AllowList
          - [] # DenyList

      # Flag single-letter variable names outside of short scopes
      - name: argument-limit
        severity: warning
        disabled: true

      # Enforce receiver naming consistency
      - name: receiver-naming
        severity: warning
        disabled: false

      # Reject bare returns in named-result functions
      - name: bare-return
        severity: warning
        disabled: false

      # Flag unnecessary else blocks
      - name: superfluous-else
        severity: warning
        disabled: false

      # Reject interface{} — enforce any
      - name: use-any
        severity: error
        disabled: false

      # Reject context.Context not being the first parameter
      - name: context-as-argument
        severity: warning
        disabled: false

      # Flag unexported return types from exported functions
      - name: unexported-return
        severity: warning
        disabled: false

      # Reject package-level comments missing
      - name: package-comments
        severity: warning
        disabled: true # enable when ready

      # Flag unused function parameters
      - name: unused-parameter
        severity: warning
        disabled: false

      # Reject empty blocks
      - name: empty-block
        severity: warning
        disabled: false

      # Flag if-return pattern (if err != nil { return err } return nil)
      - name: if-return
        severity: warning
        disabled: false

      # Reject redefining built-in identifiers
      - name: redefines-builtin-id
        severity: error
        disabled: false

  stylecheck:
    checks:
      - "all"
      - "-ST1000" # package comments — disable until ready
      - "-ST1003" # allow non-standard naming for now (gradual migration)

  gocritic:
    enabled-tags:
      - diagnostic
      - performance
      - style
    disabled-checks:
      - hugeParam       # framework passes large structs by design
      - rangeValCopy    # acceptable in this codebase
      - commentFormatting # noisy with existing comment style
      - ifElseChain     # project uses explicit if-else patterns intentionally

  gosec:
    excludes:
      - G101 # hardcoded credentials — false positives on constant names
      - G404 # weak random — not a crypto project
    severity: warning
    confidence: medium

  misspell:
    locale: US

  unparam:
    check-exported: false # don't flag exported func params — they're framework API

  errcheck:
    check-type-assertions: true
    check-blank: false # allow _ = err in intentional cases

  govet:
    enable-all: true
    disable:
      - fieldalignment # framework structs prioritize readability over alignment
      - shadow         # too noisy for this codebase

issues:
  exclude-rules:
    # Allow interface{} in test helpers and generated code
    - path: _test\.go
      linters:
        - revive
      text: "use-any"

    # Allow longer functions in test files
    - path: _test\.go
      linters:
        - revive
      text: "function-length"

    # Relax security checks in tests
    - path: _test\.go
      linters:
        - gosec

    # Relax unused params in tests
    - path: _test\.go
      linters:
        - unparam

    # Exclude cmd/main/ from strict naming (scratch/demo files)
    - path: cmd/main/
      linters:
        - revive
      text: "var-naming"

    # Allow unchecked errors in test files
    - path: _test\.go
      linters:
        - errcheck

  max-issues-per-linter: 50
  max-same-issues: 10
  new: false
