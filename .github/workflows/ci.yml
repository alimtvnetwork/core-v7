name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  # ─── SHA dedup: skip if this exact commit already passed ───
  check-sha:
    name: Check SHA Cache
    runs-on: ubuntu-latest
    outputs:
      cache-hit: ${{ steps.sha-cache.outputs.cache-hit }}
    steps:
      - name: Check if SHA already passed
        id: sha-cache
        uses: actions/cache@v4
        with:
          path: .ci-passed
          key: ci-passed-${{ github.sha }}
          lookup-only: true

  lint:
    name: Lint
    needs: check-sha
    if: needs.check-sha.outputs.cache-hit != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  vet:
    name: Vet
    needs: check-sha
    if: needs.check-sha.outputs.cache-hit != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: go vet
        run: go vet ./...

  test:
    name: Test & Coverage
    needs: check-sha
    if: needs.check-sha.outputs.cache-hit != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Run tests with coverage (parallel, verbose)
        run: |
          set +e
          go test -v -race -count=1 -parallel=4 -coverprofile=coverage.out -covermode=atomic ./... 2>&1 | tee test-output.txt
          TEST_EXIT=${PIPESTATUS[0]}
          echo "TEST_EXIT_CODE=${TEST_EXIT}" >> "$GITHUB_ENV"

          echo ""
          echo "═══════════════════════════════════════════════════════"
          echo "  TEST SUMMARY"
          echo "═══════════════════════════════════════════════════════"

          FAILURES=$(grep -E '^\s*--- FAIL:' test-output.txt || true)
          FAIL_PKGS=$(grep -E '^FAIL\s' test-output.txt || true)

          if [ -n "$FAILURES" ]; then
            echo ""
            echo "❌ FAILING TESTS:"
            echo "$FAILURES"
            echo ""
            echo "❌ FAILING PACKAGES:"
            echo "$FAIL_PKGS"
            echo ""

            echo "$FAILURES" | while IFS= read -r line; do
              TEST_NAME=$(echo "$line" | sed 's/.*--- FAIL: //' | sed 's/ (.*//')
              echo "::error::Test failed: ${TEST_NAME}"
            done
          else
            echo ""
            echo "✅ All tests passed"
          fi

          PASS_COUNT=$(grep -c '^\s*--- PASS:' test-output.txt || echo "0")
          FAIL_COUNT=$(grep -c '^\s*--- FAIL:' test-output.txt || echo "0")
          SKIP_COUNT=$(grep -c '^\s*--- SKIP:' test-output.txt || echo "0")
          echo ""
          echo "  Passed: ${PASS_COUNT}  |  Failed: ${FAIL_COUNT}  |  Skipped: ${SKIP_COUNT}"
          echo "═══════════════════════════════════════════════════════"

          exit $TEST_EXIT

      - name: Generate test summary
        if: always()
        run: |
          PASS_COUNT=$(grep -c '^\s*--- PASS:' test-output.txt 2>/dev/null || echo "0")
          FAIL_COUNT=$(grep -c '^\s*--- FAIL:' test-output.txt 2>/dev/null || echo "0")
          SKIP_COUNT=$(grep -c '^\s*--- SKIP:' test-output.txt 2>/dev/null || echo "0")
          TOTAL_COUNT=$((PASS_COUNT + FAIL_COUNT + SKIP_COUNT))

          echo "TEST_PASS_COUNT=${PASS_COUNT}" >> "$GITHUB_ENV"
          echo "TEST_FAIL_COUNT=${FAIL_COUNT}" >> "$GITHUB_ENV"
          echo "TEST_SKIP_COUNT=${SKIP_COUNT}" >> "$GITHUB_ENV"
          echo "TEST_TOTAL_COUNT=${TOTAL_COUNT}" >> "$GITHUB_ENV"

          FAILURES=$(grep -E '^\s*--- FAIL:' test-output.txt 2>/dev/null || true)
          FAIL_PKGS=$(grep -E '^FAIL\s' test-output.txt 2>/dev/null || true)
          echo "$FAILURES" > test-failures.txt
          echo "$FAIL_PKGS" > test-fail-pkgs.txt

      - name: Comment test results on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const passed = process.env.TEST_PASS_COUNT || '0';
            const failed = process.env.TEST_FAIL_COUNT || '0';
            const skipped = process.env.TEST_SKIP_COUNT || '0';
            const total = process.env.TEST_TOTAL_COUNT || '0';
            const exitCode = process.env.TEST_EXIT_CODE || '0';

            const statusIcon = exitCode === '0' ? '✅' : '❌';
            const statusText = exitCode === '0' ? 'All tests passed' : 'Some tests failed';

            let failureSection = '';
            try {
              const failures = fs.readFileSync('test-failures.txt', 'utf8').trim();
              const failPkgs = fs.readFileSync('test-fail-pkgs.txt', 'utf8').trim();
              if (failures) {
                failureSection = `\n\n### ❌ Failing Tests\n\n\`\`\`\n${failures}\n\`\`\`\n\n### 📦 Failing Packages\n\n\`\`\`\n${failPkgs}\n\`\`\``;
              }
            } catch (e) { /* no failure files */ }

            let fullOutput = '';
            try {
              const output = fs.readFileSync('test-output.txt', 'utf8');
              if (output.length > 0) {
                const truncated = output.length > 50000
                  ? output.substring(output.length - 50000)
                  : output;
                fullOutput = `\n\n<details>\n<summary>Full test output</summary>\n\n\`\`\`\n${truncated}\n\`\`\`\n</details>`;
              }
            } catch (e) { /* no output file */ }

            const body = [
              `## 🧪 Test Results`,
              ``,
              `${statusIcon} **${statusText}**`,
              ``,
              `| Passed | Failed | Skipped | Total |`,
              `|--------|--------|---------|-------|`,
              `| ${passed} ✅ | ${failed} ❌ | ${skipped} ⏭️ | ${total} |`,
              failureSection,
              fullOutput,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('🧪 Test Results'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Check coverage threshold
        run: |
          TOTAL=$(go tool cover -func=coverage.out | grep ^total: | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${TOTAL}%"
          echo "COVERAGE_TOTAL=${TOTAL}" >> "$GITHUB_ENV"
          THRESHOLD=60
          if [ "$(echo "${TOTAL} < ${THRESHOLD}" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${TOTAL}% is below threshold ${THRESHOLD}%"
            exit 1
          fi

      - name: Generate coverage report
        if: always()
        run: |
          go tool cover -func=coverage.out > coverage-summary.txt

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('coverage-summary.txt', 'utf8');
            const total = process.env.COVERAGE_TOTAL || 'unknown';
            const body = `## 📊 Coverage Report\n\n**Total coverage: ${total}%**\n\n<details>\n<summary>Full coverage breakdown</summary>\n\n\`\`\`\n${summary}\n\`\`\`\n</details>`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('📊 Coverage Report'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            coverage.out
            coverage-summary.txt

  security:
    name: Security Scan
    needs: check-sha
    if: needs.check-sha.outputs.cache-hit != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [check-sha, lint, vet, test, security]
    if: needs.check-sha.outputs.cache-hit != 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build
        run: go build ./...

  # ─── Write SHA cache on full success ───
  mark-sha:
    name: Mark SHA as Passed
    runs-on: ubuntu-latest
    needs: [check-sha, build]
    if: needs.check-sha.outputs.cache-hit != 'true'
    steps:
      - name: Write cache marker
        run: echo "passed" > .ci-passed

      - name: Save SHA cache
        uses: actions/cache/save@v4
        with:
          path: .ci-passed
          key: ci-passed-${{ github.sha }}

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [check-sha, lint, vet, test, security, build]
    if: |
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/heads/release/') &&
      (needs.check-sha.outputs.cache-hit == 'true' || success())
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Derive version from branch name
        id: version
        run: |
          BRANCH="${GITHUB_REF#refs/heads/release/}"
          echo "tag=${BRANCH}" >> "$GITHUB_OUTPUT"
          echo "Releasing version: ${BRANCH}"

      - name: Create Git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="${{ steps.version.outputs.tag }}"
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
